<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kenya County Analytics Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.1.min.js"></script>
</head>
<body>
    <div class="dashboard-shell">
        <header class="dashboard-header">
            <div>
                <h1>🇰🇪 Kenya County Analytics</h1>
                <p>Interactive county-level analytics built from KNBS abstracts, geospatial data, and ML forecasts.</p>
            </div>
            <div class="header-actions">
                <a class="button" href="/api/v1/data/download/csv">Download CSV</a>
                <a class="button" href="/api/v1/data/download/json">Download JSON</a>
            </div>
        </header>

        <main class="dashboard-main">
            <section class="map-panel">
                <div class="panel-title">Kenya County Map</div>
                <div id="map-wrapper">
                    <svg id="kenya-map" viewBox="0 0 1000 1000"></svg>
                </div>
                <div id="tooltip" class="tooltip hidden"></div>
            </section>

            <section class="summary-panel">
                <div class="panel-title">Summary</div>
                <div class="summary-grid">
                    <div class="summary-card" id="summary-counties">
                        <span class="summary-label">Counties</span>
                        <strong>—</strong>
                    </div>
                    <div class="summary-card" id="summary-available">
                        <span class="summary-label">Data Available</span>
                        <strong>—</strong>
                    </div>
                    <div class="summary-card" id="summary-tiers">
                        <span class="summary-label">Avg Development Tier</span>
                        <strong>—</strong>
                    </div>
                    <div class="summary-card" id="summary-forecast">
                        <span class="summary-label">Forecast Ready</span>
                        <strong>—</strong>
                    </div>
                </div>
                <div id="county-detail" class="detail-card hidden">
                    <button id="close-panel" class="close-button">← Close</button>
                    <div id="detail-header"></div>
                    <div id="detail-body"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
