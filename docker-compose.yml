version: '3.8'

services:
  api:
    build: .
    container_name: kenya-analytics-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - API_DEBUG=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
    command: python src/api/main.py

  postgres:
    image: postgres:15-alpine
    container_name: kenya-analytics-db
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: kenya_counties
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  n8n:
    image: n8nio/n8n:latest
    container_name: kenya-analytics-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
