version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kenya-county-api
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - kenya-net

  n8n:
    image: n8nio/n8n:latest
    container_name: kenya-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Africa/Nairobi
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/home/node/.n8n/workflows
    restart: unless-stopped
    networks:
      - kenya-net

networks:
  kenya-net:
    driver: bridge

volumes:
  n8n_data:
